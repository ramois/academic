# Ejemplo de configuración para academic.site.com
# Copiar a /etc/nginx/sites-available/ y enlazar en sites-enabled

server {
    listen 80;
    server_name academic.site.com;

    # Ruta a los estáticos del frontend (debe existir y contener index.html)
    root /var/www/academic.site.com;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API: proxy al backend (puerto 3001). /api/xxx -> backend /xxx
    location /api/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /health {
        add_header Content-Type text/plain;
        return 200 "ok";
    }
}
